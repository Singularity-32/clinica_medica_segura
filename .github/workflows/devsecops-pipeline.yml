name: DevSecOps pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  secrets-scanning:
    name: Secrets Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        run: |
          pip install truffleHog3
          truffleHog3 -r . -o json || true

  sca-scanning:
    name: Dependency Scanning (Trivy SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin latest

      - name: Run Trivy vulnerability scanner
        run: |
          trivy fs --severity HIGH,CRITICAL --format json --output trivy-results.json .

      - name: Upload Trivy report and keep job green
        run: |
          if [ -f trivy-results.json ]; then
            cat trivy-results.json
          fi
          exit 0

  sast-scanning:
    name: Static Code Analysis (Semgrep SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config=auto --json . || true
